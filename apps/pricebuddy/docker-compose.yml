
services:
  pricebuddy:
    image: jez500/pricebuddy:v1.0.46
    environment:
      - APP_URL=${APP_PROTOCOL:-http}://${APP_DOMAIN}
      - ASSET_URL=${APP_PROTOCOL:-http}://${APP_DOMAIN}
      - APP_TIMEZONE=${TZ}
      - APP_LOCALE=pt_BR
      - APP_CURRENCY_LOCALE=pt_BR
      - APP_FALLBACK_LOCALE=en_US
      - APP_FAKER_LOCALE=en_US
      - DB_HOST=pricebuddy-db
      - DB_USERNAME=pricebuddy
      - DB_PASSWORD=pricebuddy_password
      - DB_DATABASE=pricebuddy
      - APP_USER_EMAIL=admin@example.com
      - APP_USER_PASSWORD=admin
      - SCRAPER_BASE_URL=http://pricebuddy-scraper:3000
      - AFFILIATE_ENABLED=true
    volumes:
      - ${APP_DATA_DIR}/data/storage:/app/storage
      - ${APP_DATA_DIR}/data/env/.env:/app/.env
    depends_on:
      pricebuddy-db:
        condition: service_healthy
    x-runtipi:
      is_main: true
      internal_port: 80

  pricebuddy-db:
    image: mysql:8.2
    environment:
      - MYSQL_DATABASE=pricebuddy
      - MYSQL_USER=pricebuddy
      - MYSQL_PASSWORD=pricebuddy_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - ${APP_DATA_DIR}/data/database:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost -proot_password
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  pricebuddy-scraper:
    image: jez500/seleniumbase-scrapper:latest

x-runtipi:
  schema_version: 2
