version: "3"

services:
  murkpyrss:
    image: ghcr.io/rodrigomescua/murkpyrss:202604231904
    restart: always
    environment:
      - TZ=${TZ}
      - FLARESOLVERR_URL=${FLARESOLVERR_URL},
      - IS_TOP=${IS_TOP}
    volumes:
      - ${APP_DATA_DIR}/data/data:/app/data
    x-runtipi:
      is_main: true
      internal_port: 8000

x-runtipi:
  schema_version: 2
