services:
  filebrowser-quantum:
    image: gtstef/filebrowser:1.3.6-beta
    volumes:
      - ${APP_DATA_DIR}/data/data:/home/filebrowser/data
      - ${ROOT_FOLDER_HOST}:/server
    environment:
      - "FILEBROWSER_CONFIG=data/config.yaml" # using our config file at ./data/config.yaml
    restart: unless-stopped
    x-runtipi:
      is_main: true
      internal_port: 80

x-runtipi:
  schema_version: 2
