version: '3'

services:
  filebrowser-quantum:
    image: gtstef/filebrowser:stable
    volumes:
      - ${APP_DATA_DIR}/data:/home/filebrowser/data
      - ${APP_DATA_DIR}/data/folder:/folder
    restart: unless-stopped
    x-runtipi:
      is_main: true
      internal_port: 80

x-runtipi:
  schema_version: 2
