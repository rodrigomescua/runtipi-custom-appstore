
services:
  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5.3.1
    environment:
      - TZ=${TZ}
      - UPSNAP_INTERVAL=*/10 * * * * *
      - UPSNAP_SCAN_RANGE=192.168.0.0/24
      - UPSNAP_SCAN_TIMEOUT=500ms
      - UPSNAP_PING_PRIVILEGED=true
    volumes:
      - ${APP_DATA_DIR}/data/pb_data:/app/pb_data
    network_mode: host
    cap_add:
      - NET_RAW # NET_RAW is required for privileged ping and network device scan (nmap)
    cap_drop:
      - ALL
    x-runtipi:
      is_main: true
      internal_port: 8090

x-runtipi:
  schema_version: 2
