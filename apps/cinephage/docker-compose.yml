version: '3'

services:
  cinephage:
    image: ghcr.io/moldytaint/cinephage:0.11.0
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ORIGIN=http://${APP_DOMAIN}:${APP_PORT}
      - BETTER_AUTH_URL=http://${APP_DOMAIN}:${APP_PORT}
      - TZ=${TZ}
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${ROOT_FOLDER_HOST}/media:/media
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 20s
      start_interval: 5s
    x-runtipi:
      is_main: true
      internal_port: 3000

x-runtipi:
  schema_version: 2
