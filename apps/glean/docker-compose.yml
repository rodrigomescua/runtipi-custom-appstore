services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=glean
      - POSTGRES_USER=glean
      - POSTGRES_PASSWORD=glean
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U glean
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/leslieleung/glean-backend:0.2.7
    environment:
      - DATABASE_URL=postgresql+asyncpg://glean:glean@postgres:5432/glean
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=["http://localhost", "http://localhost:3000", "http://localhost:3001", "http://${APP_DOMAIN}:${APP_PORT}", "https://${APP_DOMAIN}"]
      - DEBUG=${DEBUG}
      - RUN_MIGRATIONS=true
      - CREATE_ADMIN=${CREATE_ADMIN}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_ROLE=super_admin
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/glean-api.log
      - LOG_ROTATION=100 MB
      - LOG_RETENTION=30 days
      - LOG_COMPRESSION=gz
      - LOG_SERIALIZE=false
    volumes:
      - ${APP_DATA_DIR}/data/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8000/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: uv run --no-sync uvicorn glean_api.main:app --host 0.0.0.0 --port 8000

  worker:
    image: ghcr.io/leslieleung/glean-backend:0.2.7
    environment:
      - DATABASE_URL=postgresql+asyncpg://glean:glean@postgres:5432/glean
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/glean-worker.log
      - LOG_ROTATION=100 MB
      - LOG_RETENTION=30 days
      - LOG_COMPRESSION=gz
      - LOG_SERIALIZE=false
    volumes:
      - ${APP_DATA_DIR}/data/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      milvus:
        condition: service_healthy
    command: uv run --no-sync arq glean_worker.main.WorkerSettings

  web:
    image: ghcr.io/leslieleung/glean-web:0.2.7
    depends_on:
      backend:
        condition: service_healthy
    x-runtipi:
      is_main: true
      internal_port: 80

  admin:
    image: ghcr.io/leslieleung/glean-admin:0.2.7
    depends_on:
      backend:
        condition: service_healthy

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${APP_DATA_DIR}/data/etcd:/etcd
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: etcdctl endpoint health
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - ${APP_DATA_DIR}/data/minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live || exit 1
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.6.6
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=milvus-etcd:2379
      - MINIO_ADDRESS=milvus-minio:9000
    volumes:
      - ${APP_DATA_DIR}/data/milvus:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:9091/healthz || exit 1
      interval: 30s
      timeout: 20s
      retries: 3

x-runtipi:
  schema_version: 2
