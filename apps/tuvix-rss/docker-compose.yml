version: '3'

services:
  api:
    image: ghcr.io/techsquidtv/tuvix-rss/api:0.7.1
    restart: unless-stopped
    environment:
      - CORS_ORIGIN=http://${APP_DOMAIN}
      - DATABASE_PATH=/app/data/tuvix.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - APP_BASE_URL=http://${APP_DOMAIN}
      - TZ=${TZ}
    volumes:
      - ${APP_DATA_DIR}/data:/app/data

  app:
    image: ghcr.io/techsquidtv/tuvix-rss/app:0.7.1
    restart: unless-stopped
    environment:
      - CORS_ORIGIN=http://${APP_DOMAIN}
      - VITE_API_URL=http://api:3001/trpc
      - VITE_APP_VERSION=docker
      - BASE_URL=http://${APP_DOMAIN}
      - TZ=${TZ}
    user: root
    command: /bin/sh -c "echo 'server { listen 8080; root /usr/share/nginx/html; index index.html; location / { try_files $$uri $$uri/ /index.html; sub_filter_types application/javascript; sub_filter \"http://localhost:3001/trpc\" \"/trpc\"; sub_filter_once off; } location /trpc { proxy_pass http://api:3001; } location /health { return 200 \"ok\"; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      api:
        condition: service_started
    x-runtipi:
      is_main: true
      internal_port: 5137

x-runtipi:
  schema_version: 2
