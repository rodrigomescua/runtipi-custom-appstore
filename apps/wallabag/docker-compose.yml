
services:
  wallabag_db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=wallabag
      - POSTGRES_PASSWORD=wallapass
      - POSTGRES_DB=wallabag
      - TZ=${TZ}
    volumes:
      - ${APP_DATA_DIR}/data/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U wallabag -d wallabag
      interval: 10s
      timeout: 5s
      retries: 5

  wallabag_redis:
    image: redis:alpine
    healthcheck:
      test: redis-cli ping
      interval: 20s
      timeout: 3s
      retries: 5

  wallabag:
    image: wallabag/wallabag:2.6.14
    environment:
      - POSTGRES_USER=wallabag
      - POSTGRES_PASSWORD=wallapass
      - SYMFONY__ENV__DATABASE_DRIVER=pdo_pgsql
      - SYMFONY__ENV__DATABASE_HOST=wallabag_db
      - SYMFONY__ENV__DATABASE_PORT=5432
      - SYMFONY__ENV__DATABASE_NAME=wallabag
      - SYMFONY__ENV__DATABASE_USER=wallabag
      - SYMFONY__ENV__DATABASE_PASSWORD=wallapass
      - SYMFONY__ENV__DOMAIN_NAME=https://${APP_DOMAIN}
      - SYMFONY__ENV__SERVER_NAME=Wallabag
      - SYMFONY__ENV__FOSUSER_REGISTRATION=${ALLOW_USER_REGISTRATION}
      - SYMFONY__ENV__REDIS_SCHEME=redis
      - SYMFONY__ENV__REDIS_HOST=wallabag_redis
      - SYMFONY__ENV__REDIS_PORT=6379
    depends_on:
      wallabag_db:
        condition: service_healthy
      wallabag_redis:
        condition: service_healthy
    x-runtipi:
      is_main: true
      internal_port: 80

x-runtipi:
  schema_version: 2
