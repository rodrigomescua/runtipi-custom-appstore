services:
  html2rss-web:
    image: html2rss/web:1.2.0
    environment:
      - RACK_ENV=production
      - HTML2RSS_SECRET_KEY=${HTML2RSS_SECRET_KEY}
      - HEALTH_CHECK_TOKEN=${HEALTH_CHECK_TOKEN}
      - AUTO_SOURCE_ENABLED=${AUTO_SOURCE_ENABLED:-false}
      - ASYNC_FEED_REFRESH_ENABLED=false
      - PORT=4000
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/config
    x-runtipi:
      is_main: true
      internal_port: 4000

x-runtipi:
  schema_version: 2
