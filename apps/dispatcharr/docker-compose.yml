services:
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:0.24.0
    environment:
      - DISPATCHARR_ENV=aio
      - REDIS_HOST=localhost
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - DISPATCHARR_LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - ${APP_DATA_DIR}/data/data:/data
    devices:
      - /dev/dri:/dev/dri
    x-runtipi:
      is_main: true
      internal_port: 9191

x-runtipi:
  schema_version: 2
