version: '3'

services:
  rustpnews:
    image: ghcr.io/rodrigomescua/rustpnews:202605291258
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data/data:/app/data
    environment:
      - RUSTPNEWS_API_TOKEN=${RUSTPNEWS_API_TOKEN}
      - RUSTPNEWS_POLL_INTERVAL_SECONDS=120
      - RUSTPNEWS_DETAIL_CONCURRENCY=4
      - RUSTPNEWS_FROM_OVERLAP_MINUTES=5
      - RUSTPNEWS_CHANGES_RETRY_ATTEMPTS=3
      - RUSTPNEWS_CHANGES_RETRY_BASE_DELAY_MS=500
    x-runtipi:
      is_main: true
      internal_port: 8080

x-runtipi:
  schema_version: 2
