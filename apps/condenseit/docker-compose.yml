services:
  condenseit:
    image: ghcr.io/wildlifechorus/condenseit:2.7.6
    command: ["condenseit", "serve", "--host", "0.0.0.0", "--port", "8899"]
    environment:
      - DATA_DIR=/app/data
      - TZ=${TZ}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CONDENSEIT_DATA_DIR=/app/data
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    x-runtipi:
      is_main: true
      internal_port: 8899

x-runtipi:
  schema_version: 2
