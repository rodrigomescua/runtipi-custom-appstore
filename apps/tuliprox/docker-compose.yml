services:
  tuliprox:
    image: ghcr.io/euzu/tuliprox-alpine:3.3.50
    environment:
      - TZ=${TZ}
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/config
      - ${APP_DATA_DIR}/data/data:/app/data
      - ${APP_DATA_DIR}/data/cache:/app/cache
    healthcheck:
      test: ["CMD", "/app/tuliprox", "-p", "/app/config", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    x-runtipi:
      is_main: true
      internal_port: 8901

x-runtipi:
  schema_version: 2
