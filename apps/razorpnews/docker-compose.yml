services:
  razorpnews:
    image: ghcr.io/rodrigomescua/razorpnews:202606281425
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data/data:/data
    environment:
      - DEBUG=true
      - TPDB_API_KEY=${TPDB_API_KEY}
      - RAZORPNEWS_SQLITE_PATH=/data/razorpnews.sqlite3
      - TZ=${TZ}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    x-runtipi:
      is_main: true
      internal_port: 8080

x-runtipi:
  schema_version: 2
