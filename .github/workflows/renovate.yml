name: Renovate
permissions:
  contents: write
  pull-requests: write
  issues: write
on:
  workflow_dispatch:
    inputs:
      log_level:
        type: choice
        description: Log level
        default: INFO
        options:
          - DEBUG
          - INFO
          - WARN
          - ERROR
          - FATAL
  schedule:
    - cron: 0 9 * * *   # 6:00 AM America/Sao_Paulo (UTC-3)
    - cron: 0 17 * * *  # 2:00 PM America/Sao_Paulo (UTC-3)
    - cron: 0 1 * * *   # 10:00 PM America/Sao_Paulo (UTC-3, próximo dia)
  pull_request:
  merge_group:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/global
          key: ${{ runner.os }}-bun-renovate-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-renovate-

      - name: Install Renovate
        run: bun install -g renovate@40 re2

      - name: Run renovate
        env:
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '["^bun install$","^bun \\./scripts/update-config\\.ts .*$","^bun run test$"]'
        run: LOG_LEVEL=${{ github.event.inputs.log_level || 'INFO' }} renovate --token ${{ steps.app-token.outputs.token }} ${{ github.repository }}
