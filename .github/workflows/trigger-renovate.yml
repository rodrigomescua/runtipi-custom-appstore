name: Handle Dispatch

on:
  repository_dispatch:
    types: [docker-image-updated]

jobs:
  trigger-renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Renovate Workflow
        run: |
          SOURCE_REPO="${{ github.event.client_payload.source_repo }}"

          if [ -n "$SOURCE_REPO" ]; then
            PAYLOAD=$(jq -n \
              --arg ref "main" \
              --arg logLevel "INFO" \
              --arg sourceRepo "$SOURCE_REPO" \
              '{ref: $ref, inputs: {log_level: $logLevel, source_repo: $sourceRepo}}')
          else
            PAYLOAD=$(jq -n \
              --arg ref "main" \
              --arg logLevel "INFO" \
              '{ref: $ref, inputs: {log_level: $logLevel}}')
          fi

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/renovate.yml/dispatches \
            -d "$PAYLOAD"
